name: Check Code

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1 # latest only

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      # - uses: actions/setup-python@v6
      #   with:
      #     python-version-file: ".python-version"

      - uses: pnpm/action-setup@v5
        with:
          version: latest
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      # cache pre-commit data
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Prepare
        run: |
          uv sync --frozen
          pnpm install --ignore-scripts
          cp .env.example .env

      - name: Run md format
        run: pnpm exec markdownlint-cli2 "**/*.md" "#node_modules" "#.venv"

      - name: Run py format Ruff
        run: |
          uv run --frozen ruff format --check
          uv run --frozen ruff check --no-fix --output-format=github

      # - name: Setup Biome
      #   uses: biomejs/setup-biome@v2
      #   with:
      #     version: latest

      - name: Run Biome
        # run: biome ci .
        run: pnpm exec biome ci .

      - name: Run js linter ESLint
        run: pnpm run lint

      - name: Run py test Pytest
        run: |
          uv run --frozen pytest tests/ \
            --cov \
            --cov-report=xml:coverage.xml \
            --quiet \
            --tb=short

      - name: Run js test Vitest
        run: pnpm run test

      - name: Run CSpell
        run: pnpm exec cspell-cli --gitignore --unique .
        # run: pnpm run spell

      - name: Run js type check
        run: pnpm run types

      - name: Run py dead code Vulture
        run: uv run --frozen vulture fastapi_app

      - name: Run pre-commit
        run: uv run --frozen pre-commit run --all-files

      # for SonarQube coverage report
      # - uses: SonarSource/sonarqube-scan-action@v7
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Run py audit
        run: uv audit --preview-features audit

      - name: Run js audit
        run: pnpm audit
